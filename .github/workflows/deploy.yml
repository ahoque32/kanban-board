name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: reverberant-yew-486022-j6
  REGION: us-east1
  SERVICE: kanban-board
  REPO: kanban-board
  IMAGE: us-east1-docker.pkg.dev/reverberant-yew-486022-j6/kanban-board/kanban-board

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-east1-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 3 \
            --execution-environment gen2 \
            --add-volume=name=kanban-data,type=cloud-storage,bucket=kanban-board-data-457623930004 \
            --add-volume-mount=volume=kanban-data,mount-path=/app/data \
            --set-env-vars "NODE_ENV=production,DISCORD_PUBLIC_KEY=${{ secrets.DISCORD_PUBLIC_KEY }},DISCORD_APP_ID=${{ secrets.DISCORD_APP_ID }},KANBAN_URL=https://kanban-board-457623930004.us-east1.run.app,GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }},JWT_SECRET=${{ secrets.JWT_SECRET }},BOARD_API_KEY=${{ secrets.BOARD_API_KEY }}" \
            --quiet
